name: Pipeline (CI)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargando tu código 📦
      uses: actions/checkout@v4

    - name: 2. Instalando Java 21 ☕
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: 3. Levantando PostgreSQL y Redis en la nube 🐳
      run: docker compose up -d

    - name: 4. Ejecutando Tests 🧪
      run: mvn -B clean test