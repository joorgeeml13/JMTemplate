# --- Application configuration ---
spring.application.name=base-template
server.port=9000
server.servlet.context-path=/api/v1

# -- - Logging configuration ---
logging.level.org.springframework=INFO
logging.level.base.template=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.file.total-size-cap=1GB

# --- DDBB configuration ---
spring.datasource.url=jdbc:postgresql://localhost:5432/template_db
spring.datasource.username=dev_user
spring.datasource.password=dev_password
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA configuration ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Flyway configuration ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# --- Cache configuration ---
spring.data.redis.host=localhost
spring.data.redis.port=6379

# --- Docker configuration ---
spring.docker.compose.file=docker-compose.yml
spring.docker.compose.lifecycle-management=start-and-stop

# --- i18n ---
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# --- Security configuration ---
security.jwt.secret=ebe9a6b23ccb0021eb69af5ad8bc0c751d2d21c2a4f154e32df9b51f5988357c
security.jwt.access-expiration-minutes=15

security.jwt.refresh-cookie-name=jwt-token
security.jwt.refresh-expiration-days=7

# --- Configuración de Swagger ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html


